<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Utahtech::alumni</title>
    <meta charset="utf-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<script>
function buttonEffect() {
    const btn = document.getElementById("mySummit");
    btn.classList.add("shake");

    setTimeout(() => {
        btn.classList.remove("shake");
    }, 600);
}
</script>
<div id="wrapper">

    <header>
        <h1>Contact Information</h1>
    </header>

    <div id="bluebar"></div>
    <div id="greybar"></div>

    <nav>
        <ul class="nav">
            <li><a href="Index.html">Home</a></li>
            <li><a href="competition.html">Competition</a></li>
            <li><a href="audience.html">Audience</a></li>
            <li><a href="fun.html">Form</a></li>
            <li><a href="Gallery.html">Gallery</a></li>
        </ul>
    </nav>

    <div id="funhero"></div>

    <main>
        <h2>Join Mailing List</h2>
        <p>A list where you can join to see the times and you can ask questions.</p>
        <p>Required information is marked with an asterisk (*)</p>

        <form method="post" onsubmit="return validateForm();" action="https://wfc.flitchbeta.com/se1400/index.php">
            <label for="myFName">*First name:</label>
            <input type="text" name="myFName" id="myFName" required>

            <label for="myLName">Last name:</label>
            <input type="text" name="myLName" id="myLName">

            <label for="myEmail">*Email:</label>
            <input type="email" name="myEmail" id="myEmail" required>

            <label for="myPhone">*Phone:</label>
            <input type="tel" name="myPhone" id="myPhone" required>

            <label for="myComments">Comments:</label>
            <textarea name="myComments" id="myComments" rows="2" cols="20"></textarea>

            <input type="submit" value="Submit" id="mySummit" onclick="buttonEffect()">

        </form>
    </main>

    <footer>
        Copyright &copy;
    </footer>

</div>

</body>
</html>
